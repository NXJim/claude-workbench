# Claude Workbench — Invisible tmux config
# tmux is a pure persistence layer. All interaction goes through ttyd's xterm.js.

# Unbind ALL keys so tmux never captures user input
unbind-key -a

# Mouse OFF — tmux mouse mode enables mouse reporting, which causes xterm.js
# to send mouse events to tmux instead of handling selection natively.
# This makes text highlighting disappear on mouseup. ttyd's xterm.js handles
# scrolling on its own, so tmux mouse mode is not needed.
set -g mouse off

# Hide status bar
set -g status off

# Large scrollback for capture-pane search
set -g history-limit 50000

# No escape delay (instant passthrough)
set -sg escape-time 0

# Allow 256 colors
set -g default-terminal "xterm-256color"

# Allow alternate screen buffer — TUI programs (Claude Code, vim, less) use the
# alternate screen for cursor manipulation and output rewriting. With alternate screen
# disabled, these programs corrupt the main buffer (text overwrites and disappears).
#
# Scrolling behavior with alternate screen enabled:
#   Normal screen (shell prompt): xterm.js scrolls its own 50K-line scrollback buffer
#   Alternate screen (Claude Code, etc.): xterm.js auto-converts wheel to arrow keys,
#     which the running program handles for its own scrolling. No scrollback exists in
#     the alternate buffer, so this is the correct behavior.
#   When the TUI program exits, the main buffer (with full history) is restored.

# Don't rename windows automatically
set -g allow-rename off

# Ensure copy-mode exit bindings survive unbind-key -a
bind-key -T copy-mode q send-keys -X cancel
bind-key -T copy-mode Escape send-keys -X cancel

# Strip CLAUDECODE env var so Claude Code doesn't think it's nested
set-environment -g -u CLAUDECODE
