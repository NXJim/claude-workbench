<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#D97757"/>
  <!-- Claude's sparkle/asterisk mark -->
  <g transform="translate(16,16)">
    <ellipse cx="0" cy="-7" rx="2" ry="3.5" fill="white" transform="rotate(0)"/>
    <ellipse cx="0" cy="-7" rx="2" ry="3.5" fill="white" transform="rotate(60)"/>
    <ellipse cx="0" cy="-7" rx="2" ry="3.5" fill="white" transform="rotate(120)"/>
    <ellipse cx="0" cy="-7" rx="2" ry="3.5" fill="white" transform="rotate(180)"/>
    <ellipse cx="0" cy="-7" rx="2" ry="3.5" fill="white" transform="rotate(240)"/>
    <ellipse cx="0" cy="-7" rx="2" ry="3.5" fill="white" transform="rotate(300)"/>
    <circle cx="0" cy="0" r="2.5" fill="white"/>
  </g>
</svg>
